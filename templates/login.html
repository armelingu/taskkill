<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskkill — Login</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="shortcut icon" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-body">
  <main class="auth-wrap">
    <div class="auth-card auth-card--anim">

      <div class="auth-brand">
        <!-- Logo inline (mesmo ícone do sidebar) -->
        <div class="auth-logo" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7" rx="2" fill="#ffffff"/>
            <rect x="14" y="3" width="7" height="7" rx="2" fill="#ffffff" opacity="0.7"/>
            <rect x="3" y="14" width="7" height="7" rx="2" fill="#ffffff" opacity="0.7"/>
            <rect x="14" y="14" width="7" height="7" rx="2" fill="#ffffff" opacity="0.3"/>
          </svg>
        </div>
        <div>
          <div class="auth-title">Taskkill</div>
          <div class="auth-subtitle">Entre para acessar seu painel.</div>
        </div>
      </div>

      {% if error %}
        <div class="auth-alert auth-alert-error" role="alert">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" class="auth-form" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label class="auth-label" for="username">Usuário</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input class="auth-input auth-input--icon" id="username" name="username"
                 type="text" autocomplete="username" required autofocus placeholder="seu usuário">
        </div>

        <label class="auth-label" for="password">Senha</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input class="auth-input auth-input--icon auth-input--pad-right" id="password" name="password"
                 type="password" autocomplete="current-password" required placeholder="••••••••">
          <button type="button" class="auth-toggle-pw" id="toggle-pw" aria-label="Mostrar senha" tabindex="-1">
            <svg id="eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
            </svg>
            <svg id="eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <button class="auth-btn" type="submit">Entrar</button>
      </form>
    </div>
  </main>

  <script>
    (function () {
      const btn = document.getElementById('toggle-pw');
      const inp = document.getElementById('password');
      const eyeShow = document.getElementById('eye-show');
      const eyeHide = document.getElementById('eye-hide');
      if (!btn || !inp) return;
      btn.addEventListener('click', () => {
        const shown = inp.type === 'text';
        inp.type = shown ? 'password' : 'text';
        eyeShow.style.display = shown ? '' : 'none';
        eyeHide.style.display = shown ? 'none' : '';
        btn.setAttribute('aria-label', shown ? 'Mostrar senha' : 'Ocultar senha');
      });
    })();
  </script>
</body>
</html>
